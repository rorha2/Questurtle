<!-- 🐢 HTML 주석 -->

<!DOCTYPE html>

<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questurtle</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- ■■■■■ 로그인 화면 ■■■■■ -->
<main id="login-screen">

    <section class="login-box">

        <div class="login-turtle">
            🐢
        </div>

        <h1>Questurtle</h1>

        <input
            type="text"
            id="login-id"
            placeholder="아이디"
            autocomplete="username">

        <input
            type="password"
            id="login-password"
            placeholder="비밀번호"
            autocomplete="current-password">

        <button id="login-button">
            로그인
        </button>

        <p id="login-message"></p>

    </section>

</main>

<div id="app" style="display:none;">

<h1 class="logo">
    Questurtle
</h1>


<!-- ■■■■■ 홈 화면 ■■■■■ -->
<main id="home-screen">

    <!-- 현재 로그인 사용자 -->
    <section id="current-user-card">

        <span id="current-user-icon">
            👤
        </span>

        <span id="current-user-name">
            사용자
        </span>

    </section>

    <!-- 프로필 카드 -->
    <header class="profile">

        <div class="turtle">
            <h1>🐢</h1>
        </div>

        <h2 id="profile-nickname">
        꺼북
        </h2>

        <p>
        Lv.<span id="turtle-level">1</span>
        </p>

        <p>
        [
        <span id="turtle-exp">0</span>
        /
        <span id="turtle-max-exp">2000</span>
        ]
        </p>

    </header>

    <!-- 홈 / 포인트 카드 -->
    <section class="point" id="point-card">

        <p>
        ⭐ <span class="point-number"></span> P
        </p>

    </section>

    <!-- 홈 / 메뉴 카드 -->
    <section class="menu">

        <div>

            <button class="menu-button" id="quest-button">
            퀘스트
            </button>

            <button class="menu-button" id="shop-button">
            상점
            </button>

        </div>

        <div>

            <button class="menu-button" id="bag-button">
            가방
            </button>

            <button class="menu-button" id="settings-button">
            설정
            </button>

        </div>

    </section>


</main>


<!-- ■■■■■ 포인트 화면 ■■■■■ -->
<main id="point-screen" style="display:none;">


    <button class="back-button">
    ← 홈
    </button>

    <h1>💰 포인트</h1>

    <section class="point">

        <p>
        ⭐ <span class="point-number"></span> P
        </p>

    </section>

    <input 
        type="number"
        id="point-input"
        placeholder="숫자 입력">

    <div>
        <button id="add-point">
            적립
        </button>

        <button id="use-point">
            사용
        </button>
    </div>

    <div id="point-history">

        <h3>📜 내역</h3>

    </div>


</main>

<!-- ■■■■■ 퀘스트 화면 ■■■■■ -->
<main id="quest-screen" style="display:none;">

    <button class="back-button">
    ← 홈
    </button>

    <h1>📝 퀘스트</h1>

    <div id="quest-list">

    </div>

</main>


<!-- ■■■■■ 상점 화면 ■■■■■ -->
<main id="shop-screen" style="display:none;">

    <button class="back-button">
    ← 홈
    </button>

    <h1>🛒 상점</h1>

    <section class="point">

        <p>
        ⭐ <span class="point-number"></span> P
        </p>

    </section>

    <section id="shop-list">

    </section>

</main>


<!-- ■■■■■ 가방 화면 ■■■■■ -->
<main id="bag-screen" style="display:none;">

    <button class="back-button">
    ← 홈
    </button>

    <h1>🎒 가방</h1>

    <section id="bag-list">

    </section>

</main>


<!-- ■■■■■ 설정 화면 ■■■■■ -->
<main id="settings-screen" style="display:none;">

    <button class="back-button">
        ← 홈
    </button>

    <h1>⚙️ 설정</h1>

    <section class="settings-list">

        <div class="setting-item">
            <span>🔊 효과음</span>
            <button id="sound-button">ON</button>
        </div>

        <div class="setting-item">
            <span>🎵 배경음</span>
            <button id="music-button">ON</button>
        </div>

        <div class="setting-item">
            <span>🎨 테마</span>
            <button id="theme-button">기본</button>
        </div>

        <div class="setting-item">

        <span>🐢 거북이 이름</span>

        <input
            type="text"
            id="turtle-name-input"
            placeholder="거북이 이름">

        <button id="turtle-name-button">
            변경
        </button>

        </div>

    </section>

    <hr class="settings-divider">

    <button class="menu-button" id="admin-button">
        🔒 관리자
    </button>

    <button class="menu-button" id="logout-button">
    로그아웃
    </button>

</main>


<!-- ■■■■■ 관리자 화면 ■■■■■ -->
<main id="admin-screen" style="display:none;">

    <button class="back-button">
        ← 설정
    </button>

    <h1>🔒 관리자</h1>

    <p>관리자 비밀번호를 입력하세요.</p>

    <input
        type="password"
        id="admin-password"
        placeholder="비밀번호">

    <button class="menu-button" id="admin-login-button">
        확인
    </button>

</main>


<!-- 현재 버전 -->
<footer class="ver">
    0.8 Ver
</footer>

</div>

<script src="js/data.js"></script>
<script src="js/elements.js"></script>
<script src="js/auth.js"></script>
<script src="js/storage.js"></script>
<script src="js/point.js"></script>
<script src="js/ui.js"></script>
<script src="js/quest.js"></script>
<script src="js/shop.js"></script>
<script src="js/bag.js"></script>
<script src="js/app.js"></script>


</body>

</html>
