<!-- 🐢 HTML 주석 -->

<!DOCTYPE html>

<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questurtle</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>


<h1 class="logo">
    Questurtle
</h1>


<!-- ■■■■■ 홈 화면 ■■■■■ -->
<main id="home-screen">

    <!-- 프로필 카드-->
    <header class="profile">

        <div class="turtle">
            <h1>🐢</h1>
        </div>

        <h2>꺼북</h2>
        <p>Lv.1</p>
        <p>[0 / 2000]</p>

    </header>

    <!-- 홈 / 포인트 카드 -->
    <section class="point" id="point-card">

        <p>
        ⭐ <span class="point-number"></span> P
        </p>

    </section>

    <!-- 홈 / 메뉴 카드 -->
    <section class="menu">

        <div>

            <button class="menu-button" id="quest-button">
            퀘스트
            </button>

            <button class="menu-button" id="shop-button">
            상점
            </button>

        </div>

        <div>

            <button class="menu-button">가방</button>
            <button class="menu-button">설정</button>

        </div>

    </section>


</main>


<!-- ■■■■■ 포인트 화면 ■■■■■ -->
<main id="point-screen" style="display:none;">


    <button class="back-button">
    ← 홈
    </button>

    <h1>💰 포인트</h1>

    <section class="point">

        <p>
        ⭐ <span class="point-number"></span> P
        </p>

    </section>

    <input 
        type="number"
        id="point-input"
        placeholder="숫자 입력">

    <div>
        <button id="add-point">
            적립
        </button>

        <button id="use-point">
            사용
        </button>
    </div>

    <div id="point-history">

        <h3>📜 내역</h3>

    </div>


</main>

<!-- ■■■■■ 퀘스트 화면 ■■■■■ -->
<main id="quest-screen" style="display:none;">

    <button class="back-button">
    ← 홈
    </button>

    <h1>📝 퀘스트</h1>

    <div id="quest-list">

    </div>

</main>


<!-- ■■■■■ 상점 화면 ■■■■■ -->
<main id="shop-screen" style="display:none;">

    <button class="back-button">
    ← 홈
    </button>

    <h1>🛒 상점</h1>

    <p>
    준비 중...
    </p>

</main>


<!-- 현재 버전 -->
<footer class="ver">
    0.5 Ver
</footer>


<script src="js/data.js"></script>
<script src="js/elements.js"></script>
<script src="js/storage.js"></script>
<script src="js/point.js"></script>
<script src="js/ui.js"></script>
<script src="js/quest.js"></script>
<script src="js/app.js"></script>


</body>

</html>
